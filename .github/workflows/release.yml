name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version represented by an existing vX.Y.Z tag
        required: true
        type: string
      candidate_run_id:
        description: Successful publishable Release Candidate workflow run ID
        required: true
        type: string
      publish_itch:
        description: Upload the verified GitHub Release bytes to itch.io
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: write

concurrency:
  group: release-v${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      ITCH_PROJECT: ${{ vars.ITCH_PROJECT }}
      RELEASE_VERSION: ${{ inputs.version }}
      CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
      PUBLISH_ITCH: ${{ inputs.publish_itch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate candidate workflow run
        shell: bash
        run: |
          test "$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CANDIDATE_RUN_ID" --jq .name)" = "Release Candidate"
          test "$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CANDIDATE_RUN_ID" --jq .conclusion)" = "success"
      - name: Download exact candidate artifacts without rebuilding
        run: gh run download "$CANDIDATE_RUN_ID" --dir candidate-artifacts
      - name: Install butler
        if: inputs.publish_itch
        shell: bash
        run: |
          BUTLER_VERSION=15.29.0
          BUTLER_SHA256=0568594aadf8bd437b6ca6d5eabc298d414a2ed7275068c5ee82485754db21c2
          curl --fail --location --retry 3 --output "$RUNNER_TEMP/butler.zip" \
            "https://broth.itch.zone/butler/linux-amd64/$BUTLER_VERSION/archive/default"
          printf '%s  %s\n' "$BUTLER_SHA256" "$RUNNER_TEMP/butler.zip" | sha256sum --check --strict
          unzip -q "$RUNNER_TEMP/butler.zip" -d "$RUNNER_TEMP/butler"
          chmod +x "$RUNNER_TEMP/butler/butler"
          test "$("$RUNNER_TEMP/butler/butler" -V | cut -d, -f1)" = "v$BUTLER_VERSION"
          printf '%s\n' "$RUNNER_TEMP/butler" >> "$GITHUB_PATH"
      - name: Verify manifests, create GitHub Release, and optionally publish same bytes to itch.io
        shell: bash
        run: |
          ITCH_ARG=()
          if [ "$PUBLISH_ITCH" = "true" ]; then ITCH_ARG+=(--itch); fi
          node editor/build-scripts/publish-release.cjs \
            --version "$RELEASE_VERSION" \
            --commit "$(git rev-parse HEAD)" \
            --candidates candidate-artifacts \
            "${ITCH_ARG[@]}"
